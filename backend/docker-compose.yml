services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: cavista
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cavista
      SPRING_DATASOURCE_USERNAME: test_user
      SPRING_DATASOURCE_PASSWORD: test
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data: