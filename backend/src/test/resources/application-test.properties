# Test profile - H2 in-memory database with Hibernate-managed schema.
# Postgres-flavoured Flyway migrations are skipped here.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.default_schema=app
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

spring.flyway.enabled=false

# No Redis in default tests — use in-memory cache for @Cacheable.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
spring.cache.type=simple

spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT for tests
app.security.jwt.secret=dGVzdC1zZWNyZXQtZm9yLWp3dC1sb2NhbC10ZXN0aW5nLW9ubHktMTIzNDU2Nzg5MA==
app.security.jwt.expiration-ms=3600000

logging.level.org.springframework=WARN
