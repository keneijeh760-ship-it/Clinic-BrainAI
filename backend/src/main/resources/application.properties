spring.application.name=cavista

server.port=${PORT:8080}
server.address=0.0.0.0

logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [%t] [%X{requestId:-}] %logger{36} - %msg%n

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/test_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:test_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:test}

spring.h2.console.enabled=false

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=app

spring.flyway.enabled=true
spring.flyway.schemas=app
spring.flyway.default-schema=app
spring.flyway.baseline-on-migrate=true

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# JWT
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:25ba5ad9a25f203589f467c28ad3a5965c90dd4f381e7596080d94ba16763130}
app.security.jwt.expiration-ms=${APP_SECURITY_JWT_EXPIRATION_MS:86400000}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

logging.level.org.springframework=INFO
logging.level.org.hibernate=ERROR
